<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>virinchi.dev</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --card: #111;
            --card2: #161616;
            --border: rgba(255, 255, 255, 0.07);
            --lime: #c8f135;
            --pink: #ff3cac;
            --cyan: #00f5d4;
            --white: #f0f0f0;
            --muted: #666;
            --muted2: #444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-thumb {
            background: var(--muted2);
            border-radius: 2px
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            padding: 18px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(24px);
            background: rgba(8, 8, 8, 0.85);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 18px;
            text-decoration: none;
            color: var(--white);
        }

        .logo span {
            color: var(--lime);
        }

        .nav-back {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .nav-back:hover {
            color: var(--white);
        }

        .topic-hero {
            padding: 120px 48px 60px;
            max-width: 800px;
            margin: 0 auto;
        }

        .topic-num {
            font-size: 12px;
            color: var(--muted);
            font-family: monospace;
            margin-bottom: 12px;
        }

        .topic-badge {
            display: inline-block;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 100px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .tb1 {
            background: rgba(200, 241, 53, 0.1);
            color: var(--lime);
        }

        .tb2 {
            background: rgba(0, 245, 212, 0.1);
            color: var(--cyan);
        }

        .topic-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1.05;
            margin-bottom: 12px;
        }

        .topic-subtitle {
            font-size: 17px;
            color: var(--muted);
            font-weight: 300;
            line-height: 1.6;
        }

        .topic-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 48px 60px;
        }

        .content-section {
            margin-bottom: 40px;
        }

        .content-heading {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .content-text {
            font-size: 15px;
            color: var(--muted);
            line-height: 1.8;
            font-weight: 300;
        }

        .callout {
            background: rgba(200, 241, 53, 0.06);
            border: 1px solid rgba(200, 241, 53, 0.15);
            border-left: 3px solid var(--lime);
            border-radius: 0 12px 12px 0;
            padding: 16px 20px;
            font-size: 15px;
            color: var(--white);
            line-height: 1.7;
            font-weight: 300;
        }

        .code-block {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .code-bar {
            background: var(--card2);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .code-dots {
            display: flex;
            gap: 5px;
        }

        .code-dots span {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }

        .code-dots span:nth-child(1) {
            background: #ff5f57
        }

        .code-dots span:nth-child(2) {
            background: #febc2e
        }

        .code-dots span:nth-child(3) {
            background: #28c840
        }

        .code-pre {
            padding: 20px 24px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.9;
            color: var(--lime);
            overflow-x: auto;
            white-space: pre;
        }

        .points-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .point-item {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .point-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(200, 241, 53, 0.08);
            border: 1px solid rgba(200, 241, 53, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .point-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--white);
            margin-bottom: 3px;
        }

        .point-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.55;
            font-weight: 300;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 48px 80px;
            gap: 12px;
        }

        .nav-btn {
            padding: 12px 24px;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .nav-btn.prev {
            background: transparent;
            color: var(--white);
            border: 1px solid var(--border);
        }

        .nav-btn.prev:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }

        .nav-btn.next {
            background: var(--lime);
            color: #080808;
            border: none;
            font-weight: 600;
        }

        .nav-btn.next:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .nav-btn.hidden {
            visibility: hidden;
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 28px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: var(--muted);
        }

        .footer-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 15px;
            color: var(--white);
        }

        .footer-logo span {
            color: var(--lime);
        }

        @media(max-width:768px) {
            nav {
                padding: 16px 20px;
            }

            .topic-hero,
            .topic-content,
            .nav-buttons {
                padding-left: 20px;
                padding-right: 20px;
            }

            footer {
                padding: 20px;
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }

        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0;
            text-decoration: none;
            color: #f0f0f0;
            line-height: 1;
        }

        .logo-bracket {
            color: #c8f135;
        }

        .logo-slash {
            color: #ff3cac;
        }

        .logo-dev {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 18px;
            color: #c8f135;
            margin-left: 3px;
            letter-spacing: -0.5px;
        }

        * {
            cursor: none;
        }

        .cursor {
            width: 10px;
            height: 10px;
            background: #c8f135;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
            mix-blend-mode: difference;
        }

        .cursor-ring {
            width: 34px;
            height: 34px;
            border: 1.5px solid #c8f135;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.5;
            mix-blend-mode: difference;
        }
    </style>
</head>

<body>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <nav>
        <div class="logo">
            <span class="logo-bracket">&lt;</span>V<span class="logo-slash">/</span><span
                class="logo-bracket">&gt;</span><span class="logo-dev">.dev</span>
        </div>
        <a href="index.html" class="nav-back">← Back to home</a>
    </nav>

    <div class="topic-hero">
        <div class="topic-num" id="topicNum"></div>
        <div class="topic-badge" id="topicBadge"></div>
        <h1 class="topic-title" id="topicTitle"></h1>
        <p class="topic-subtitle" id="topicSubtitle"></p>
    </div>

    <div class="topic-content" id="topicContent"></div>

    <div class="nav-buttons">
        <a class="nav-btn prev" id="prevBtn" href="#">← Previous</a>
        <a class="nav-btn next" id="nextBtn" href="#">Next →</a>
    </div>

    <footer>
        <div class="footer-logo">virinchi<span>.dev</span></div>
        <div>Built for builders. Free forever.</div>
        <a href="https://instagram.com/virinchi_valmiki" target="_blank"
            style="color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.2s;"
            onmouseover="this.style.color='#c8f135'" onmouseout="this.style.color='var(--muted)'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" />
                <circle cx="12" cy="12" r="5" />
                <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none" />
            </svg>
            @virinchi_valmiki
        </a>
        <div>© 2025 virinchi.dev</div>
    </footer>

    <script src="topics.js"></script>
    <script>
        // Resolve topic id from clean pathname slug (Vercel rewrite) or ?id= param (local dev)
        const slugMap = {}
        topics.forEach(t => { slugMap[t.slug] = t.id })
        const pathSlug = window.location.pathname.split('/').pop()
        const params = new URLSearchParams(window.location.search)
        const id = slugMap[pathSlug] || parseInt(params.get('id')) || 1
        const topic = topics.find(t => t.id === id)

        if (!topic) window.location.href = 'index.html'

        document.title = topic.title + ' — virinchi.dev'
        document.getElementById('topicNum').textContent = 'Topic ' + topic.num
        document.getElementById('topicTitle').textContent = topic.title
        document.getElementById('topicSubtitle').textContent = topic.subtitle

        const badge = document.getElementById('topicBadge')
        badge.textContent = topic.badge
        badge.className = 'topic-badge ' + (topic.badge === 'Beginner' ? 'tb1' : 'tb2')

        const content = document.getElementById('topicContent')
        topic.sections.forEach(sec => {
            const div = document.createElement('div')
            div.className = 'content-section'
            if (sec.type === 'text') {
                div.innerHTML = '<h2 class="content-heading">' + sec.heading + '</h2><p class="content-text">' + sec.content + '</p>'
            } else if (sec.type === 'callout') {
                div.innerHTML = '<div class="callout">' + sec.content + '</div>'
            } else if (sec.type === 'code') {
                div.innerHTML = '<h2 class="content-heading">' + sec.heading + '</h2><div class="code-block"><div class="code-bar"><div class="code-dots"><span></span><span></span><span></span></div></div><pre class="code-pre">' + sec.code + '</pre></div>'
            } else if (sec.type === 'points') {
                const pts = sec.points.map(p => '<div class="point-item"><div class="point-icon">' + p.icon + '</div><div><p class="point-title">' + p.title + '</p><p class="point-desc">' + p.desc + '</p></div></div>').join('')
                div.innerHTML = '<h2 class="content-heading">' + sec.heading + '</h2><div class="points-grid">' + pts + '</div>'
            }
            content.appendChild(div)
        })

        const prevBtn = document.getElementById('prevBtn')
        const nextBtn = document.getElementById('nextBtn')
        const prevTopic = topics.find(t => t.id === id - 1)
        const nextTopic = topics.find(t => t.id === id + 1)

        if (!prevTopic) {
            prevBtn.classList.add('hidden')
        } else {
            prevBtn.href = prevTopic.url
            prevBtn.textContent = '← Topic ' + String(id - 1).padStart(2, '0')
        }

        if (!nextTopic) {
            nextBtn.classList.add('hidden')
        } else {
            nextBtn.href = nextTopic.url
            nextBtn.textContent = 'Topic ' + String(id + 1).padStart(2, '0') + ' →'
        }

        // Throttled cursor RAF (CWV fix — stops idle 60fps loop)
        const cursor = document.getElementById('cursor')
        const ring = document.getElementById('cursorRing')
        let mx = 0, my = 0, rx = 0, ry = 0, rafPending = false

        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY
            cursor.style.left = mx - 5 + 'px'
            cursor.style.top = my - 5 + 'px'
            if (!rafPending) { rafPending = true; requestAnimationFrame(animRing) }
        })

        function animRing() {
            rx += (mx - rx) * 0.12
            ry += (my - ry) * 0.12
            ring.style.left = rx - 17 + 'px'
            ring.style.top = ry - 17 + 'px'
            rafPending = Math.abs(mx - rx) > 0.5 || Math.abs(my - ry) > 0.5
            if (rafPending) requestAnimationFrame(animRing)
        }

        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.style.transform = 'scale(2.5)')
            el.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)')
        })
    </script>
</body>

</html>
